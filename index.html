<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Object - Guess the Item</title>
    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --accent: #538d4e;
            --button: #3a3a3c;
            --button-hover: #4e4e50;
        }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 450px; width: 100%; text-align: center; }
        
        header { border-bottom: 1px solid var(--button); margin-bottom: 20px; width: 100%; padding-bottom: 10px; }
        h1 { margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5rem; }

        .hint-box {
            background: var(--button);
            padding: 25px 15px;
            border-radius: 8px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 1.1rem;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        #button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 4px;
            background: var(--button);
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: var(--button-hover); }
        button:disabled { opacity: 0.2; cursor: default; }

        .input-group { margin-top: 10px; }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 4px;
            border: 2px solid var(--button);
            background: #000;
            color: white;
            box-sizing: border-box;
            text-transform: uppercase;
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .submit-btn { background: var(--accent); width: 100%; font-size: 1.2rem; }
        
        #result {
            display: none;
            margin-top: 25px;
            padding: 25px;
            border: 3px solid var(--accent);
            border-radius: 12px;
            background: rgba(83, 141, 78, 0.1);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .share-btn { background: #1da1f2; margin-top: 15px; width: 100%; }
        
        .error-msg { color: #ff4444; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DAILY OBJECT</h1>
    </header>
    
    <div class="hint-box" id="display-hint">
        Loading today's challenge...
    </div>

    <div id="button-grid">
        </div>

    <div class="input-group">
        <input type="text" id="guess-input" placeholder="GUESS THE OBJECT" autocomplete="off">
        <button class="submit-btn" id="submit-btn" onclick="checkGuess()">SUBMIT GUESS</button>
    </div>

    <div id="result">
        <h2 style="margin-top: 0;">CORRECT! 🎉</h2>
        <p id="final-score-text" style="font-size: 1.4rem; font-weight: bold;"></p>
        <p id="answer-reveal" style="font-style: italic; color: #aaa;"></p>
        <button class="share-btn" onclick="shareResults()">SHARE RESULTS</button>
    </div>
</div>

<script>
    // 1. Category Mapping (Map letters to Display Names)
    const categoryNames = {
        S: "Science",
        E: "Entertainment",
        H: "History",
        F: "Food",
        G: "Geography",
        P: "Pop Culture",
        U: "Utility",
        N: "Nature"
    };

    // 2. State Variables
    let todaysObject = null;
    let hintsUsedCount = 0;
    let hintPath = "";

    // 3. Main Init Function
    async function initGame() {
        try {
            // Fetch the JSON file (ensure it's named daily_data.json in the same folder)
            const response = await fetch('daily_data.json');
            const allData = await response.json();

            // Get current date in YYYY-MM-DD format (local time)
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const todayStr = `${year}-${month}-${day}`;

            // Find the object for today
            todaysObject = allData.find(item => item.date === todayStr);

            if (todaysObject) {
                renderGame();
            } else {
                document.getElementById('display-hint').innerHTML = "<span class='error-msg'>New object coming at midnight!</span>";
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('display-hint').innerHTML = "<span class='error-msg'>Unable to load game data. Check your JSON file.</span>";
        }
    }

    function renderGame() {
        const grid = document.getElementById('button-grid');
        const hintDisplay = document.getElementById('display-hint');

        // Show Initial Hint
        hintDisplay.innerHTML = `<strong>Initial Clue:</strong><br>${todaysObject.basic}`;

        // Create buttons for available hints
        Object.keys(todaysObject.hints).forEach(key => {
            const hintText = todaysObject.hints[key];
            
            // Only create button if hint exists and isn't empty
            if (hintText && hintText.trim() !== "") {
                const btn = document.createElement('button');
                btn.innerText = categoryNames[key] || "Hint";
                btn.onclick = (e) => revealHint(key, e.target);
                grid.appendChild(btn);
            }
        });
    }

    function revealHint(key, btn) {
        hintsUsedCount++;
        hintPath += key;
        
        const hintDisplay = document.getElementById('display-hint');
        hintDisplay.innerHTML = `<strong>${categoryNames[key]}:</strong><br>${todaysObject.hints[key]}`;
        
        btn.disabled = true;
    }

    function checkGuess() {
        const userInput = document.getElementById('guess-input').value.trim().toUpperCase();
        
        if (userInput === todaysObject.answer.toUpperCase()) {
            showWin();
        } else {
            alert("Not quite! Try another hint or a different guess.");
        }
    }

    function showWin() {
        const resultDiv = document.getElementById('result');
        const scoreString = `${hintsUsedCount}${hintPath}`;
        
        document.getElementById('final-score-text').innerText = `Score: ${scoreString}`;
        document.getElementById('answer-reveal').innerText = `The object was: ${todaysObject.answer}`;
        
        resultDiv.style.display = 'block';
        document.getElementById('guess-input').disabled = true;
        document.getElementById('submit-btn').disabled = true;
        
        // Scroll to results on mobile
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function shareResults() {
        const scoreString = `${hintsUsedCount}${hintPath}`;
        const shareText = `Daily Object ✅\nScore: ${scoreString}\nPlay here: [Your Link Here]`;
        
        if (navigator.share) {
            navigator.share({
                title: 'Daily Object',
                text: shareText
            });
        } else {
            navigator.clipboard.writeText(shareText);
            alert("Score copied to clipboard!");
        }
    }

    // Launch!
    initGame();
</script>

</body>
</html>
