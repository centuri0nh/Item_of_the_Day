<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item of the Day</title>
    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --accent: #538d4e;
            --button: #3b3b3c;
            --button-hover: #4e4e50;
            --gold: #d4af37;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0;
        }
        .container { max-width: 450px; width: 100%; text-align: center; }
        header { border-bottom: 2px solid var(--button); margin-bottom: 20px; width: 100%; }
        h1 { margin: 15px 0; letter-spacing: 2px; font-size: 1.8rem; font-weight: 800; text-transform: uppercase; }

        .hint-box {
            background: var(--button);
            padding: 25px 20px;
            border-radius: 12px;
            margin: 20px 0 10px 0;
            min-height: 100px;
            display: flex; flex-direction: column; justify-content: center;
            font-size: 1.15rem; line-height: 1.5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .sub-header {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        button {
            padding: 15px 10px; border: none; border-radius: 6px;
            background: var(--button); color: white;
            cursor: pointer; font-weight: bold; font-size: 0.9rem;
            text-transform: uppercase; transition: 0.2s;
        }
        button:hover:not(:disabled) { background: var(--button-hover); }
        button:disabled { opacity: 0.2; cursor: default; }

        input {
            width: 100%; padding: 15px; border-radius: 6px;
            border: 2px solid var(--button); background: #000;
            color: white; box-sizing: border-box; text-transform: uppercase;
            text-align: center; font-size: 1.4rem; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .submit-btn { background: var(--accent); width: 100%; font-size: 1.2rem; height: 60px; }
        
        #result {
            display: none; margin-top: 30px; padding: 25px;
            border: 3px solid var(--accent); border-radius: 15px;
            background: rgba(83, 141, 78, 0.15); animation: slideUp 0.5s ease-out;
        }

        .streak-container {
            display: flex; justify-content: space-around; margin: 15px 0;
            padding: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 8px;
        }
        .streak-stat { display: flex; flex-direction: column; font-size: 0.8rem; color: #aaa; }
        .streak-val { font-size: 1.5rem; color: var(--gold); font-weight: bold; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .share-btn { background: #1da1f2; margin-top: 20px; width: 100%; }
        .error-msg { color: #ff6b6b; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ITEM OF THE DAY</h1>
    </header>
    
    <div class="hint-box" id="display-hint">Loading...</div>

    <div id="game-ui">
        <div class="sub-header" id="additional-hint-text" style="display:none;">Need an Additional Hint?</div>
        <div id="button-grid"></div>
        <input type="text" id="guess-input" placeholder="GUESS THE ITEM" autocomplete="off">
        <button class="submit-btn" id="submit-btn" onclick="checkGuess()">SUBMIT GUESS</button>
    </div>

    <div id="result">
        <h2 style="margin: 0 0 10px 0;">SOLVED! 🎉</h2>
        <div class="streak-container">
            <div class="streak-stat">STREAK <span class="streak-val" id="streak-count">0</span></div>
            <div class="streak-stat">TOTAL WINS <span class="streak-val" id="total-wins">0</span></div>
        </div>
        <p id="final-score-text" style="font-size: 1.3rem; font-weight: bold; margin: 10px 0;"></p>
        <p id="answer-reveal" style="font-style: italic; opacity: 0.8;"></p>
        <button class="share-btn" onclick="shareResults()">SHARE SCORE</button>
    </div>
</div>

<script>
    const categoryNames = {
        Hint_S: "Science", Hint_E: "Entertainment", Hint_H: "History", 
        Hint_F: "Food", Hint_G: "Geography", Hint_P: "Pop Culture", 
        Hint_U: "Utility", Hint_N: "Nature", Hint_R: "Random"
    };

    let todaysObject = null;
    let hintsUsedCount = 0;
    let hintPath = "";

    function getUtcDate(dateObj = new Date()) {
        const y = dateObj.getUTCFullYear();
        const m = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getUTCDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    async function initGame() {
        try {
            const response = await fetch('daily_data.json?t=' + new Date().getTime());
            const allData = await response.json();
            const utcToday = getUtcDate();

            todaysObject = allData.find(item => item["Date (YYYY-MM-DD)"].trim() === utcToday);

            if (!todaysObject) {
                document.getElementById('display-hint').innerHTML = `<span class='error-msg'>New item coming at UTC midnight!</span>`;
                return;
            }

            const lastSolvedDate = localStorage.getItem('iod_lastSolved');
            if (lastSolvedDate === utcToday) {
                const savedScore = localStorage.getItem('iod_lastScore') || "Solved";
                showWin(savedScore);
                return;
            }

            renderGame();

        } catch (error) {
            console.error(error);
            document.getElementById('display-hint').innerHTML = "<span class='error-msg'>Data load error.</span>";
        }
    }

    function renderGame() {
        const grid = document.getElementById('button-grid');
        document.getElementById('display-hint').innerHTML = `<strong>Initial Clue:</strong><br>${todaysObject["Basic Hint"]}`;
        
        let hasHints = false;

        Object.keys(todaysObject).forEach(key => {
            if (key.startsWith("Hint_") && todaysObject[key] && todaysObject[key].trim() !== "") {
                const btn = document.createElement('button');
                btn.innerText = categoryNames[key] || key.replace("Hint_", "");
                btn.onclick = (e) => revealHint(key, e.target);
                grid.appendChild(btn);
                hasHints = true;
            }
        });

        if(hasHints) {
            document.getElementById('additional-hint-text').style.display = 'block';
        }
    }

    function revealHint(key, btn) {
        hintsUsedCount++;
        const codeLetter = key.split('_')[1] || key.charAt(5);
        hintPath += codeLetter;
        document.getElementById('display-hint').innerHTML = `<strong>${categoryNames[key] || "Hint"}:</strong><br>${todaysObject[key]}`;
        btn.disabled = true;
    }

    function checkGuess() {
        const userInput = document.getElementById('guess-input').value.trim().toUpperCase();
        if (userInput === todaysObject["Answer"].trim().toUpperCase()) {
            showWin();
        } else {
            alert("Not quite!");
        }
    }

    function showWin(reloadedScore = null) {
        const utcToday = getUtcDate();
        const scoreString = reloadedScore || `${hintsUsedCount}${hintPath}`;

        if (!reloadedScore) {
            updateStreakAndStats(utcToday, scoreString);
        }

        document.getElementById('streak-count').innerText = localStorage.getItem('iod_streak') || 0;
        document.getElementById('total-wins').innerText = localStorage.getItem('iod_totalWins') || 0;
        document.getElementById('final-score-text').innerText = `Score: ${scoreString}`;
        document.getElementById('answer-reveal').innerText = `The item was: ${todaysObject["Answer"]}`;
        
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('display-hint').innerHTML = "<strong>Come back tomorrow for a new item!</strong>";
        document.getElementById('result').style.display = 'block';
    }

    function updateStreakAndStats(todayStr, score) {
        let streak = parseInt(localStorage.getItem('iod_streak') || "0");
        let totalWins = parseInt(localStorage.getItem('iod_totalWins') || "0");
        const lastDate = localStorage.getItem('iod_lastSolved');
        totalWins++;

        if (lastDate) {
            const lastDateObj = new Date(lastDate + "T00:00:00Z");
            const todayObj = new Date(todayStr + "T00:00:00Z");
            const diffDays = (todayObj - lastDateObj) / (1000 * 60 * 60 * 24);
            if (diffDays === 1) streak++; 
            else if (diffDays > 1) streak = 1;
        } else {
            streak = 1;
        }

        localStorage.setItem('iod_lastSolved', todayStr);
        localStorage.setItem('iod_lastScore', score);
        localStorage.setItem('iod_streak', streak);
        localStorage.setItem('iod_totalWins', totalWins);
    }

    function shareResults() {
        const score = document.getElementById('final-score-text').innerText;
        const streak = localStorage.getItem('iod_streak') || 0;
        const text = `Item of the Day ✅\n${score}\nStreak: ${streak} days\nPlay: ${window.location.href}`;
        if (navigator.share) {
            navigator.share({ title: 'Item of the Day', text: text });
        } else {
            navigator.clipboard.writeText(text);
            alert("Results copied!");
        }
    }

    initGame();
</script>

</body>
</html>
